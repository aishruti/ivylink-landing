    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />

    <!--
      PERF: Fonts are self-hosted via @fontsource-variable, imported
      directly from src/index.css. The browser fetches them as bundled
      assets from the same origin (no DNS lookup or TLS handshake to
      fonts.googleapis.com / fonts.gstatic.com). Removing those external
      dependencies eliminates 2 round-trips that were costing ~300 to 500ms
      of LCP on 4G.
    -->

    <!--
      PERF: Critical inline CSS. Keeps the LCP text painted with a system
      fallback even before the bundled CSS arrives.
    -->
    <style>
      html,body{margin:0;padding:0;width:100%;background:#fff;color:#19191c;}
      body{font-family:'DM Sans Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
      #root{min-height:100vh;width:100%;}
    </style>

    <!-- Structured Data: Organization, SoftwareApplication, and FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "IvyLink",
          "url": "https://ivylink.ai",
          "logo": "https://ivylink.ai/logo.png",
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "nalin@ivylink.co",
            "contactType": "customer support"
          }
        },
        {
          "@type": "SoftwareApplication",
          "name": "IvyLink",
          "description": "Revenue recovery service for wellness businesses. IvyLink texts lapsed clients, answers inbound DMs, and books appointments automatically. Performance pricing: 20% of recovered revenue.",

          "operatingSystem": "Web",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "description": "Performance-based pricing. Pay 20% of recovered revenue only."
          },
          "audience": {
            "@type": "Audience",
            "audienceType": "Wellness businesses including med spas, gyms, salons, and yoga studios"
          }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "How does IvyLink pricing work?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "IvyLink charges 20% of recovered revenue only. If we do not recover revenue for your business, you pay nothing. There is no setup fee and no monthly retainer."
              }
            },
            {
              "@type": "Question",
              "name": "What types of wellness businesses does IvyLink work with?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "IvyLink works with med spas, gyms, salons, yoga studios, and other wellness businesses that use booking systems like Mindbody, Vagaro, or Jane App."
              }
            },
            {
              "@type": "Question",
              "name": "How quickly does IvyLink respond to client inquiries?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "IvyLink responds to inbound DMs and missed calls in under 15 seconds on average."
              }
            },
            {
              "@type": "Question",
              "name": "What is the win-back rate for lapsed clients?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "IvyLink achieves an average 11% win-back rate on lapsed client campaigns."
              }
            }
          ]
        }
      ]
    }
    </script>
