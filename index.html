<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IvyLink - Automate Med Spa Collabs That Fill Your Calendar</title>
    <meta name="description" content="Turn 10+ hours of outreach into minutes. Automated local-collab engine that fills empty spa slots fast and tracks real bookings." />
    <meta name="author" content="IvyLink" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

    <!-- Canonical -->
    <link rel="canonical" href="https://ivylink.ai/" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />

    <!--
      PERF: Fonts are now self-hosted via @fontsource-variable, imported
      directly from src/index.css. The browser fetches them as bundled
      assets from the same origin — no DNS lookup or TLS handshake to
      fonts.googleapis.com / fonts.gstatic.com. Removing those external
      dependencies eliminates 2 round-trips that were costing ~300–500ms
      of LCP on 4G.
    -->

    <!--
      PERF: Critical inline CSS — keeps the LCP text painted with a system
      fallback even before the bundled CSS arrives.
    -->
    <style>
      html,body{margin:0;padding:0;background:#fff;color:#19191c;}
      body{font-family:'DM Sans Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
      #root{min-height:100vh;}
    </style>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "IvyLink",
      "url": "https://ivylink.ai",
      "logo": "https://ivylink.ai/favicon.png",
      "description": "IvyLink's AI automates med spa referral swaps with local partners to turn their foot traffic into your bookings on autopilot.",
      "sameAs": ["https://app.ivylink.ai"],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@ivylink.com",
        "contactType": "customer support"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "IvyLink",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://ivylink.ai",
      "description": "Automated local-collab engine for med spas. Find partners, launch service swaps, and track real bookings.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "127"
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "IvyLink",
      "url": "https://ivylink.ai"
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "Who is IvyLink for?", "acceptedAnswer": { "@type": "Answer", "text": "Single-location med spas, injectors, and aesthetic practices who want consistent bookings from local partnerships without the awkward networking." } },
        { "@type": "Question", "name": "How does the partner matching work?", "acceptedAnswer": { "@type": "Answer", "text": "We scan your area for complementary businesses (gyms, studios, salons) and identify the best collaboration fits based on audience overlap and partnership potential." } },
        { "@type": "Question", "name": "Is my data secure?", "acceptedAnswer": { "@type": "Answer", "text": "Yes, we connect through official APIs and never share your client data with partners. Your information stays yours." } },
        { "@type": "Question", "name": "What does it cost to get started?", "acceptedAnswer": { "@type": "Answer", "text": "Book a call to learn about our pricing. We guarantee 5 new bookings in 21 days or we keep working for free until you do." } },
        { "@type": "Question", "name": "How is this different from ads or a CRM?", "acceptedAnswer": { "@type": "Answer", "text": "Ads bring strangers who may never return. CRMs manage existing clients. IvyLink builds partnerships that send you warm referrals month after month." } },
        { "@type": "Question", "name": "How soon will I see results?", "acceptedAnswer": { "@type": "Answer", "text": "Most med spas see new appointments within the first 21 days. Our system starts identifying partners immediately after setup." } }
      ]
    }
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ivylink.ai/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="IvyLink" />
    <meta property="og:title" content="IvyLink - Automate Med Spa Collabs That Fill Your Calendar" />
    <meta property="og:description" content="Turn 10+ hours of outreach into minutes. Automated local-collab engine that fills empty spa slots fast and tracks real bookings." />
    <meta property="og:image" content="https://ivylink.ai/favicon.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@IvyLink" />
    <meta name="twitter:creator" content="@IvyLink" />
    <meta name="twitter:title" content="IvyLink - Automate Med Spa Collabs That Fill Your Calendar" />
    <meta name="twitter:description" content="Turn 10+ hours of outreach into minutes. Automated local-collab engine that fills empty spa slots fast and tracks real bookings." />
    <meta name="twitter:image" content="https://ivylink.ai/favicon.png" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
