<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IvyLink: Local Marketing Platform for Wellness Businesses</title>
    <meta name="description" content="IvyLink is the local marketing platform for wellness businesses. Partner with nearby gyms, salons, and med spas to share customers and fill your calendar without ads." />
    <meta name="author" content="IvyLink" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

    <!-- Canonical -->
    <link rel="canonical" href="https://ivylink.ai/" />

    <!-- Favicons. ?v=2 cache-bust forces Google + browsers to re-fetch the IvyLink chain-link icon
         instead of any previously cached Lovable default. -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png?v=2" />

    <!--
      PERF: Fonts are self-hosted via @fontsource-variable, imported
      directly from src/index.css. The browser fetches them as bundled
      assets from the same origin (no DNS lookup or TLS handshake to
      fonts.googleapis.com / fonts.gstatic.com). Removing those external
      dependencies eliminates 2 round-trips that were costing ~300 to 500ms
      of LCP on 4G.
    -->

    <!--
      PERF: Critical inline CSS. Keeps the LCP text painted with a system
      fallback even before the bundled CSS arrives.
    -->
    <style>
      html,body{margin:0;padding:0;background:#fff;color:#19191c;}
      body{font-family:'DM Sans Variable','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
      #root{min-height:100vh;}
    </style>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "IvyLink",
      "url": "https://ivylink.ai",
      "logo": "https://ivylink.ai/favicon.png?v=2",
      "description": "IvyLink is the local marketing platform built for wellness businesses. Partner with nearby gyms, salons, and med spas to share customers, fill empty slots, and grow revenue without spending on ads.",
      "sameAs": ["https://app.ivylink.ai"],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@ivylink.com",
        "contactType": "customer support"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "IvyLink",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://ivylink.ai",
      "description": "Local marketing platform for wellness businesses. Match with nearby partners, run AI-designed joint promotions with mutual offers, and track every booking back to its source via QR codes.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "IvyLink",
      "url": "https://ivylink.ai"
    }
    </script>

    <!-- Structured Data: FAQPage. Keep in sync with FAQ.tsx component. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "Who is IvyLink for?", "acceptedAnswer": { "@type": "Answer", "text": "Owners of local wellness businesses, including med spas, salons, gyms, yoga studios, pilates studios, nail bars, wellness centers, massage practices, and aesthetic clinics. If your business has a local clientele and complementary partners nearby, IvyLink works for you." } },
        { "@type": "Question", "name": "How is this different from a referral program?", "acceptedAnswer": { "@type": "Answer", "text": "Referral programs reward your existing customers for sending friends. IvyLink builds partnerships with other local businesses, so their entire customer base actively gets pointed toward yours. No customer-side effort required, and the volume is dramatically higher." } },
        { "@type": "Question", "name": "Do I need to spend money on ads?", "acceptedAnswer": { "@type": "Answer", "text": "No. IvyLink is built specifically for wellness businesses that want growth without a paid ads budget. The only thing you 'spend' is the discount on your partnership offer, and only when a partner's customer actually shows up and books." } },
        { "@type": "Question", "name": "How much does it cost?", "acceptedAnswer": { "@type": "Answer", "text": "IvyLink is free to sign up and explore. You can match with partners and create your first play at no cost. Reach out if you'd like to discuss our plans for active partnerships." } },
        { "@type": "Question", "name": "How does the QR code tracking work?", "acceptedAnswer": { "@type": "Answer", "text": "Every active partnership gets two unique QR codes, one for each business's offer. When a customer scans and books, the system records who referred them, what they booked, and what it was worth. You see full attribution in your dashboard, in real time." } },
        { "@type": "Question", "name": "How does the partner matching work?", "acceptedAnswer": { "@type": "Answer", "text": "IvyLink scans your area for complementary businesses and ranks them by audience overlap, location, and partnership potential. You see every potential partner within a 5-mile radius, sorted by best match. We never share your client data with partners. Your information stays yours." } },
        { "@type": "Question", "name": "How long does it take to see results?", "acceptedAnswer": { "@type": "Answer", "text": "Most businesses send their first partnership play within 10 minutes of signing up. Bookings typically follow in the first 1 to 3 weeks, depending on how quickly partners activate their offers." } },
        { "@type": "Question", "name": "What if the partner I want isn't on IvyLink yet?", "acceptedAnswer": { "@type": "Answer", "text": "You can still send them a partnership invitation through IvyLink. We handle the outreach, generate the play, and walk them through joining. No awkward cold DMs from you." } }
      ]
    }
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ivylink.ai/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="IvyLink" />
    <meta property="og:title" content="IvyLink: Local Marketing Platform for Wellness Businesses" />
    <meta property="og:description" content="IvyLink is the local marketing platform for med spas, salons, gyms, and studios. Partner with nearby businesses to share customers and fill empty slots without ads." />
    <meta property="og:image" content="https://ivylink.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="IvyLink: Local Marketing Platform for Wellness Businesses" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@IvyLink" />
    <meta name="twitter:creator" content="@IvyLink" />
    <meta name="twitter:title" content="IvyLink: Local Marketing Platform for Wellness Businesses" />
    <meta name="twitter:description" content="IvyLink is the local marketing platform for med spas, salons, gyms, and studios. Partner with nearby businesses to share customers and fill empty slots without ads." />
    <meta name="twitter:image" content="https://ivylink.ai/og-image.png" />
    <meta name="twitter:image:alt" content="IvyLink: Local Marketing Platform for Wellness Businesses" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!--
      PERF: Defer all third-party analytics until the page is idle.
    -->

          (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
          })(window, document, "clarity", "script", "vezjpp70ak");

          var gaScript = document.createElement('script');
          gaScript.async = true;
          gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-8M90KE9LFQ';
          document.head.appendChild(gaScript);

          window.gtag = function () { window.dataLayer.push(arguments); };

      })();
    </script>
  </body>
</html>
